<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | AgriFuture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style> @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap'); * { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div></div>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-green-100 fade-in">
        <div class="text-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/2909/2909768.png" class="w-16 h-16 mx-auto mb-3" alt="AgriFuture">
            <h1 class="text-3xl font-black text-green-800">إنشاء حساب جديد</h1>
            <p class="text-gray-500">انضم إلى ثورة الزراعة الذكية</p>
        </div>
        <form id="registerForm" class="space-y-4 text-right">
            <div><label class="block text-sm font-bold text-gray-600 mb-1">الاسم الكامل</label><input type="text" id="regName" required class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="فلاح جزائري"></div>
            <div><label class="block text-sm font-bold text-gray-600 mb-1">البريد الإلكتروني</label><input type="email" id="regEmail" required class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="example@email.com"></div>
            <div class="relative"><label class="block text-sm font-bold text-gray-600 mb-1">كلمة المرور</label><input type="password" id="regPassword" required minlength="8" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="8 أحرف على الأقل"><button type="button" class="toggle-pw absolute left-3 top-9 text-gray-400 hover:text-green-600"><i class="fas fa-eye"></i></button></div>
            <div class="relative"><label class="block text-sm font-bold text-gray-600 mb-1">تأكيد كلمة المرور</label><input type="password" id="regConfirm" required minlength="8" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="أعد كتابة كلمة المرور"><button type="button" class="toggle-pw absolute left-3 top-9 text-gray-400 hover:text-green-600"><i class="fas fa-eye"></i></button></div>
            <button type="submit" class="w-full py-3.5 bg-green-600 text-white rounded-xl font-black text-lg shadow-lg hover:bg-green-700 transition btn-ripple">إنشاء الحساب</button>
        </form>
        <p class="text-center mt-6 text-gray-500">لديك حساب بالفعل؟ <a href="login.html" class="text-green-700 font-bold hover:underline">تسجيل الدخول</a></p>
        <a href="index.html" class="block text-center mt-3 text-gray-400 hover:text-green-600 text-sm"><i class="fas fa-arrow-right ml-1"></i> العودة للرئيسية</a>
    </div>

    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        window.addEventListener('load', () => { document.getElementById('loader').style.display = 'none'; });

        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
                else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
            });
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (password !== confirm) { showError('كلمة المرور غير متطابقة'); return; }
            if (password.length < 8) { showError('كلمة المرور قصيرة جداً'); return; }

            const result = Auth.register(name, email, password);
            if (result.success) {
                showSuccess('تم إنشاء الحساب بنجاح');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                showError(result.message || 'حدث خطأ ما');
            }
        });
    </script>
</body>
</html>
