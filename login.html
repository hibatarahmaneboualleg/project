<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | AgriFuture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style> @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap'); * { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div></div>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-green-100 fade-in">
        <div class="text-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/2909/2909768.png" class="w-16 h-16 mx-auto mb-3" alt="AgriFuture">
            <h1 class="text-3xl font-black text-green-800">تسجيل الدخول</h1>
            <p class="text-gray-500">مرحباً بعودتك إلى منصتك الذكية</p>
        </div>
        <form id="loginForm" class="space-y-5 text-right">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">البريد الإلكتروني</label>
                <input type="email" id="loginEmail" required class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="example@email.com">
            </div>
            <div class="relative">
                <label class="block text-sm font-bold text-gray-600 mb-1">كلمة المرور</label>
                <input type="password" id="loginPassword" required class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500" placeholder="••••••••">
                <button type="button" id="togglePassword" class="absolute left-3 top-9 text-gray-400 hover:text-green-600"><i class="fas fa-eye"></i></button>
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-2 text-gray-600"><input type="checkbox" class="accent-green-600"> تذكرني</label>
                <a href="#" class="text-green-700 font-bold hover:underline">نسيت كلمة المرور؟</a>
            </div>
            <button type="submit" class="w-full py-3.5 bg-green-600 text-white rounded-xl font-black text-lg shadow-lg hover:bg-green-700 transition btn-ripple">دخول</button>
        </form>
        <p class="text-center mt-6 text-gray-500">ليس لديك حساب؟ <a href="register.html" class="text-green-700 font-bold hover:underline">إنشاء حساب جديد</a></p>
        <a href="index.html" class="block text-center mt-3 text-gray-400 hover:text-green-600 text-sm"><i class="fas fa-arrow-right ml-1"></i> العودة للرئيسية</a>
    </div>

    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        window.addEventListener('load', () => { document.getElementById('loader').style.display = 'none'; });

        document.getElementById('togglePassword').addEventListener('click', function() {
            const pw = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { pw.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const result = Auth.login(email, password);
            if (result.success) {
                showSuccess('تم تسجيل الدخول بنجاح');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            } else {
                showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
            }
        });
    </script>
</body>
</html>
